name: terraform-validate-ci
on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-validate-ci.yaml'
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-validate-ci.yaml'
jobs:
  terraform-validate-ci:
    uses: basel5001/githubinfra/.github/workflows/terraform-validate.yml@main
    with:
      working-dir: terraform
      run-tfsec: false
